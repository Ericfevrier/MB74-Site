# Environnement de DEV LOCAL du CMS Directus + MariaDB.
# (En prod o2switch : MariaDB cPanel + app Node Directus — voir README.md)
#
#   cd cms && cp .env.example .env  (puis éditer les secrets)
#   docker compose up -d
#   → Admin Directus : http://localhost:8055
#
services:
  database:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mb74_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 6

  directus:
    image: directus/directus:11
    restart: unless-stopped
    ports:
      - "8055:8055"
    depends_on:
      database:
        condition: service_healthy
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      DB_CLIENT: mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PUBLIC_URL: ${PUBLIC_URL}
      # CORS pour que le site React puisse appeler l'API en dev
      CORS_ENABLED: "true"
      CORS_ORIGIN: "http://localhost:3000"
    volumes:
      - mb74_uploads:/directus/uploads
      - mb74_extensions:/directus/extensions

volumes:
  mb74_db:
  mb74_uploads:
  mb74_extensions:
