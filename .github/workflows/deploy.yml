name: Build & publish bundle SSR (o2switch)

# On ne build PAS sur o2switch (outils natifs incompatibles : esbuild, moteur Tailwind…).
# Ce workflow build le site sur un runner GitHub (Linux récent, prebuilds OK) puis
# publie un bundle PRÊT À L'EMPLOI (pur JS au runtime) sur la branche `deploy`.
# o2switch n'a plus qu'à : git pull origin deploy && npm install --omit=dev && restart.

on:
  push:
    branches: [ssr-migration, main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-bundle
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: '1' # Chromium inutile pour le build SSR

      - name: Build SSR
        run: npm run build:ssr

      - name: Assembler le bundle de déploiement
        run: |
          rm -rf deploy-bundle
          mkdir -p deploy-bundle
          cp -r build deploy-bundle/build
          cp -r server deploy-bundle/server
          cp package.json package-lock.json deploy-bundle/
          cp .env.example deploy-bundle/ 2>/dev/null || true
          # Liens symboliques pour servir les STATIQUES via Apache (et non l'app Node).
          # o2switch sert directement les fichiers existants dans la racine du document ;
          # ça contourne Passenger et son 429 sur les rafales HTTP/2.
          ln -s build/client/assets deploy-bundle/assets
          ln -s build/client/images deploy-bundle/images
          ln -s build/client/favicon-64.png deploy-bundle/favicon-64.png
          ln -s build/client/apple-touch-icon.png deploy-bundle/apple-touch-icon.png
          ln -s build/client/robots.txt deploy-bundle/robots.txt
          ln -s build/client/sitemap.xml deploy-bundle/sitemap.xml

      - name: Publier sur la branche deploy
        run: |
          cd deploy-bundle
          git init -q -b deploy
          git config user.email "ci@motorboat74.com"
          git config user.name "MB74 CI"
          git add -A
          git commit -q -m "deploy: bundle SSR depuis ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
